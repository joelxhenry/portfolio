services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
      # Helps file watching in some Docker setups
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    volumes:
      - .:/app:cached
      - /app/node_modules
      - /app/.next
    command: ["npm", "run", "dev", "--", "-p", "4000", "-H", "0.0.0.0"]

